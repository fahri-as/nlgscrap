<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopee Scraper – 3 Produk Termurah</title>
    <meta name="description" content="Cari 3 produk termurah di Shopee berdasarkan keyword. Powered by Puppeteer." />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
      }
      .card-result {
        counter-increment: result-counter;
      }
      #results {
        counter-reset: result-counter;
      }
      .loading-dots::after {
        content: "";
        animation: dots 1.5s infinite;
      }
      @keyframes dots {
        0% {
          content: "";
        }
        25% {
          content: ".";
        }
        50% {
          content: "..";
        }
        75% {
          content: "...";
        }
      }
    </style>
  </head>
  <body class="min-h-screen bg-orange-50 py-10 px-4">
    <div class="max-w-2xl mx-auto">
      <!-- Header -->
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-orange-600 mb-1">🛍️ Shopee Scraper</h1>
        <p class="text-gray-500 text-sm">Temukan 3 produk dengan harga paling murah di Shopee</p>
      </div>

      <!-- Search Form -->
      <div class="bg-white rounded-2xl shadow-md p-6 mb-6">
        <div class="flex flex-col sm:flex-row gap-3">
          <input
            id="keyword"
            type="text"
            placeholder="Masukkan keyword, misal: Compressor"
            class="flex-1 border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-transparent"
            maxlength="100" />
          <button
            id="searchBtn"
            onclick="handleSearch()"
            class="bg-orange-500 hover:bg-orange-600 active:bg-orange-700 text-white font-semibold px-6 py-2.5 rounded-lg text-sm transition-colors duration-150 whitespace-nowrap">
            🔍 Cari
          </button>
        </div>
        <!-- Error message -->
        <p id="inputError" class="text-red-500 text-xs mt-2 hidden"></p>
      </div>

      <!-- Status / Loading -->
      <div id="statusBox" class="hidden bg-orange-100 border border-orange-300 rounded-xl px-5 py-3 text-sm text-orange-700 mb-6">
        <span class="loading-dots">⏳ Sedang scraping Shopee</span>
        <span class="text-xs block text-orange-500 mt-0.5">Proses ini membutuhkan waktu 15–30 detik...</span>
      </div>

      <!-- Error Box -->
      <div id="errorBox" class="hidden bg-red-50 border border-red-300 rounded-xl px-5 py-3 text-sm text-red-700 mb-6">
        <strong>⚠️ Error:</strong> <span id="errorMsg"></span>
      </div>

      <!-- Warning Box -->
      <div id="warningBox" class="hidden bg-yellow-50 border border-yellow-300 rounded-xl px-5 py-3 text-sm text-yellow-800 mb-6 leading-relaxed">
        <strong>⚠️ Peringatan:</strong> <span id="warningMsg"></span>
      </div>

      <!-- Results -->
      <div id="results" class="space-y-4 hidden">
        <h2 class="text-base font-semibold text-gray-600 mb-2">Hasil pencarian: <span id="keywordLabel" class="text-orange-600"></span></h2>
        <!-- Cards will be injected here -->
      </div>
    </div>

    <script>
      const keywordInput = document.getElementById("keyword");
      const searchBtn = document.getElementById("searchBtn");
      const inputError = document.getElementById("inputError");
      const statusBox = document.getElementById("statusBox");
      const errorBox = document.getElementById("errorBox");
      const errorMsg = document.getElementById("errorMsg");
      const warningBox = document.getElementById("warningBox");
      const warningMsg = document.getElementById("warningMsg");
      const resultsDiv = document.getElementById("results");
      const keywordLabel = document.getElementById("keywordLabel");

      // Allow Enter key to trigger search
      keywordInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") handleSearch();
      });

      function showError(msg) {
        errorBox.classList.remove("hidden");
        errorMsg.textContent = msg;
      }

      function hideAll() {
        statusBox.classList.add("hidden");
        errorBox.classList.add("hidden");
        warningBox.classList.add("hidden");
        resultsDiv.classList.add("hidden");
        inputError.classList.add("hidden");
      }

      function renderResults(keyword, items) {
        keywordLabel.textContent = `"${keyword}"`;
        resultsDiv.innerHTML = `
        <h2 class="text-base font-semibold text-gray-600 mb-2">
          Hasil pencarian: <span class="text-orange-600">"${escapeHtml(keyword)}"</span>
        </h2>
      `;

        items.forEach((item) => {
          const card = document.createElement("div");
          card.className = "card-result bg-white rounded-2xl shadow-sm border border-gray-100 p-5";
          card.innerHTML = `
          <div class="flex items-start gap-3">
            <div class="flex-shrink-0 w-8 h-8 rounded-full bg-orange-500 text-white flex items-center justify-center font-bold text-sm">
              ${item.rank}
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-xs text-gray-400 font-medium uppercase tracking-wide mb-0.5">Nama Product</p>
              <p class="text-sm font-semibold text-gray-800 leading-snug mb-3">${escapeHtml(item.nama || item.name || "-")}</p>

              <p class="text-xs text-gray-400 font-medium uppercase tracking-wide mb-0.5">Harga</p>
              <p class="text-base font-bold text-orange-600 mb-3">${escapeHtml(item.harga)}</p>

              <p class="text-xs text-gray-400 font-medium uppercase tracking-wide mb-0.5">Link</p>
              <a
                href="${escapeHtml(item.link)}"
                target="_blank"
                rel="noopener noreferrer"
                class="text-xs text-blue-600 hover:text-blue-800 hover:underline break-all"
              >${escapeHtml(item.link)}</a>
            </div>
          </div>
        `;
          resultsDiv.appendChild(card);
        });

        resultsDiv.classList.remove("hidden");
      }

      function escapeHtml(str) {
        const div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
      }

      async function handleSearch() {
        hideAll();

        const keyword = keywordInput.value.trim();

        // Client-side validation
        if (!keyword) {
          inputError.textContent = "Keyword tidak boleh kosong.";
          inputError.classList.remove("hidden");
          keywordInput.focus();
          return;
        }

        // Show loading
        statusBox.classList.remove("hidden");
        searchBtn.disabled = true;
        searchBtn.textContent = "⏳ Scraping...";

        try {
          const response = await fetch("/search", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ keyword }),
          });

          const data = await response.json();

          if (!response.ok) {
            showError(data.error || "Terjadi kesalahan pada server.");
            return;
          }

          if (!data.results || data.results.length === 0) {
            showError("Tidak ada hasil ditemukan untuk keyword tersebut.");
            return;
          }

          if (data.warning) {
            warningBox.classList.remove("hidden");
            warningMsg.textContent = data.warning;
          }

          renderResults(data.keyword, data.results);
        } catch (err) {
          showError("Koneksi ke server gagal. Pastikan server berjalan dan coba lagi.");
        } finally {
          statusBox.classList.add("hidden");
          searchBtn.disabled = false;
          searchBtn.textContent = "🔍 Cari";
        }
      }
    </script>
  </body>
</html>
